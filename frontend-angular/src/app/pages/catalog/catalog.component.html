<nav class="breadcrumb">

<a routerLink="/home">Inicio</a>

<span>›</span>

<a routerLink="/categories">Categorías</a>

<span>›</span>

<a routerLink="/catalog">Catálogo</a>

<span>›</span>

<span class="current">
{{category}}
</span>

</nav>

<section class="catalog-container">

<div class="catalog-box">

<div class="catalog-header">

<h2>Resultados de búsqueda</h2>

<span>{{books.length}} libros encontrados</span>

</div>

<hr>

<div class="books-grid">

<div
class="book-card"
*ngFor="let book of books"
(click)="openBook(book)"
>

<img 
[src]="book.imagen || book.thumbnail || 'assets/default-book-cover.jpg'"
alt="Libro"
>

<h3>{{book.titulo || book.title}}</h3>

<p class="author">
{{book.autor || book.author}}
</p>

</div>

</div>

</div>

</section>
