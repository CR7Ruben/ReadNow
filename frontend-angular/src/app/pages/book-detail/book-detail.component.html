<!-- ══════ BREADCRUMB ══════ -->
<nav class="breadcrumb" aria-label="breadcrumb">
  <a (click)="goToHome()" style="cursor: pointer;">Inicio</a>
  <span>›</span>
  <a (click)="goToCatalog()" style="cursor: pointer;">Catálogo</a>
  <span>›</span>
  <span class="current">Detalle del Libro</span>
</nav>

<div *ngIf="loading">
  ⏳ Cargando libro...
</div>

<div *ngIf="book && !loading">
  <h1>{{ book.title }}</h1>
  <p><strong>Autor:</strong> {{ book.author }}</p>

  <img *ngIf="book.thumbnail" [src]="book.thumbnail" />

  <p>{{ book.description }}</p>

  <span *ngIf="book.premium">🔒 Solo Premium</span>
</div>
